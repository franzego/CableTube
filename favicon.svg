<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Base/stand -->
  <rect x="11" y="28" width="10" height="3" fill="#444444" />
  
  <!-- Antennas -->
  <line x1="16" y1="7" x2="10" y2="2" stroke="#555555" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="7" x2="22" y2="2" stroke="#555555" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Outer body -->
  <rect x="3" y="7" width="26" height="22" rx="3" fill="#333333" />
  
  <!-- Screen -->
  <rect x="5" y="10" width="18" height="15" rx="1" fill="#0a0a1a" />
  
  <!-- Screen glow -->
  <ellipse cx="8" cy="12" rx="2" ry="1" fill="#aaccff" opacity="0.4" />
  
  <!-- Knobs -->
  <circle cx="25.5" cy="13" r="1.5" fill="#555555" />
  <circle cx="25.5" cy="19" r="1.5" fill="#555555" />
</svg>
